	<rect class="bg" width="2120" height="1192"/>
	<rect width="2120" height="1192" fill="url(#grid)"/>
	<rect width="2120" height="1192" fill="url(#bgGlow)"/>

	<g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
		<line x1="120" y1="160" x2="2000" y2="160"/>
		<line x1="120" y1="1032" x2="2000" y2="1032"/>
	</g>

	<g transform="translate(120 376)">
		<rect class="mark" x="0" y="0" width="40" height="232" rx="6"/>
		<path class="mark" d="M40 0 H100 a116 116 0 0 1 0 232 H40 V192 H94 a76 76 0 0 0 0 -152 H40 Z"/>
		<circle class="dot" cx="244" cy="214" r="18"/>
	</g>

	<g transform="translate(120 720)">
		<text class="eyebrow" x="0" y="0" font-size="24">ESTUDIO INDEPENDIENTE &#183; M&#193;LAGA</text>
	</g>

	<g transform="translate(120 820)">
		<text class="title" x="0" y="0" font-size="128">Domindez Studio</text>
	</g>

	<g transform="translate(120 940)">
		<text class="italic" x="0" y="0" font-size="72">Dise&#241;o y desarrollo web a medida</text>
	</g>

	<g transform="translate(120 1040)">
		<rect width="1880" height="2" fill="url(#line)"/>
	</g>

	<g transform="translate(120 1100)" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace" font-size="22" fill="#a1a1a1" letter-spacing="0.16em">
		<text x="0" y="0">7+ A&#209;OS</text>
		<text x="320" y="0">150+ PROYECTOS</text>
		<text x="720" y="0">100+ CLIENTES</text>
		<text x="1080" y="0">C&#211;DIGO A MEDIDA</text>
		<text x="1480" y="0">SEO &amp; CORE WEB VITALS</text>
	</g>

	<g transform="translate(2000 1192)">
		<text text-anchor="end" x="0" y="-40" class="mute" font-size="18">DOMINDEZ.COM</text>
	</g>
