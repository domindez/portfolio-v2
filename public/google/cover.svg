<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2120 1192" width="2120" height="1192" role="img" aria-label="Domindez Studio — Diseño y desarrollo web">
	<defs>
		<radialGradient id="bgGlow" cx="78%" cy="50%" r="55%">
			<stop offset="0%" stop-color="#c3ff00" stop-opacity="0.22"/>
			<stop offset="50%" stop-color="#c3ff00" stop-opacity="0.05"/>
			<stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
		</radialGradient>
		<linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#f5f5f0" stop-opacity="0"/>
			<stop offset="50%" stop-color="#f5f5f0" stop-opacity="0.35"/>
			<stop offset="100%" stop-color="#f5f5f0" stop-opacity="0"/>
		</linearGradient>
		<pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
			<path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
		</pattern>
		<style>
			.bg { fill: #0a0a0a; }
			.mark { fill: #f5f5f0; }
			.dot { fill: #c3ff00; }
			.eyebrow {
				font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace;
				fill: #c3ff00;
				letter-spacing: 0.22em;
			}
			.title {
				font-family: 'Space Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif;
				font-weight: 500;
				fill: #f5f5f0;
				letter-spacing: -0.025em;
			}
			.italic {
				font-family: 'Instrument Serif', 'Times New Roman', serif;
				font-style: italic;
				font-weight: 400;
				fill: #c3ff00;
			}
			.mute {
				font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace;
				fill: #6b6b6b;
				letter-spacing: 0.18em;
			}
		</style>
